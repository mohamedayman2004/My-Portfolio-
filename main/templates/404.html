<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0;">
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #020617; color: #cbd5e1; font-family: 'Space Grotesk', monospace; text-align: center;">
        <div>
            <h1 style="font-size: 8rem; color: #3b82f6; font-weight: bold; margin: 0; text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);">404</h1>
            <p style="font-size: 1.5rem; margin-bottom: 2rem;">Oops! The page you're looking for was lost in the neural network.</p>
            <a href="/" style="display: inline-block; padding: 12px 24px; background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.5); text-decoration: none; border-radius: 9999px; transition: all 0.3s; font-family: 'Outfit', sans-serif;">
                Return Home
            </a>
        </div>
    </div>

    <script>
        const btn = document.querySelector('a');
        btn.addEventListener('mouseenter', () => {
            btn.style.backgroundColor = '#3b82f6';
            btn.style.color = '#ffffff';
        });
        btn.addEventListener('mouseleave', () => {
            btn.style.backgroundColor = 'rgba(59, 130, 246, 0.1)';
            btn.style.color = '#3b82f6';
        });
    </script>
</body>
</html>
